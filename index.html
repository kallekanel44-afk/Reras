<!DOCTYPE html>
<html>
<head>
    <title>3D City Map</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // sky blue

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(20, 50, 10);
scene.add(sun);

scene.add(new THREE.AmbientLight(0xaaaaaa));

// Ground
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// City generation
const citySize = 10;
const blockSize = 10;
const roadWidth = 3;

for (let x = -citySize; x < citySize; x++) {
    for (let z = -citySize; z < citySize; z++) {

        // ROAD (every 3rd block)
        if (x % 3 === 0 || z % 3 === 0) {
            const road = new THREE.Mesh(
                new THREE.PlaneGeometry(blockSize, blockSize),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );

            road.rotation.x = -Math.PI / 2;
            road.position.set(x * blockSize, 0.01, z * blockSize);
            scene.add(road);

        } else {
            // BUILDINGS
            const height = Math.random() * 20 + 5;

            const building = new THREE.Mesh(
                new THREE.BoxGeometry(6, height, 6),
                new THREE.MeshStandardMaterial({
                    color: new THREE.Color(`hsl(${Math.random()*360},30%,60%)`)
                })
            );

            building.position.set(
                x * blockSize,
                height / 2,
                z * blockSize
            );

            scene.add(building);
        }
    }
}

// Player
const player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({ color: 0x00ccff })
);
player.position.y = 2;
scene.add(player);

// Movement
let keys = {};
let velocityY = 0;
let gravity = -0.02;
let onGround = false;
let speed = 0.2;

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Game loop
function animate() {
    requestAnimationFrame(animate);

    // Movement
    if (keys["w"]) player.position.z -= speed;
    if (keys["s"]) player.position.z += speed;
    if (keys["a"]) player.position.x -= speed;
    if (keys["d"]) player.position.x += speed;

    // Jump
    if (keys[" "] && onGround) {
        velocityY = 0.35;
        onGround = false;
    }

    velocityY += gravity;
    player.position.y += velocityY;

    if (player.position.y <= 0.5) {
        player.position.y = 0.5;
        velocityY = 0;
        onGround = true;
    }

    // Camera follow
    camera.position.set(
        player.position.x,
        player.position.y + 6,
        player.position.z + 10
    );
    camera.lookAt(player.position);

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
